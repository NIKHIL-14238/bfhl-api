<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL Node Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6aff;
      --accent2: #ff6a9b;
      --green: #3dffa0;
      --yellow: #ffd166;
      --red: #ff5e7a;
      --text: #e8e8f0;
      --muted: #6e6e8a;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,106,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,106,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    header {
      margin-bottom: 48px;
      text-align: center;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(124,106,255,0.2), rgba(255,106,155,0.15));
      border: 1px solid rgba(124,106,255,0.3);
      border-radius: 100px;
      padding: 6px 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .logo-badge .dot {
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
      font-family: var(--mono);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      line-height: 1.7;
      padding: 16px;
      resize: vertical;
      min-height: 140px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.12);
    }

    textarea::placeholder { color: var(--muted); }

    .hint {
      margin-top: 10px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    button {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #9b55ff);
      color: #fff;
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,106,255,0.4); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover { color: var(--text); border-color: var(--accent); }

    .spinner {
      display: none;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Results */
    #results { display: none; }

    .results-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }

    @media (max-width: 600px) { .results-grid { grid-template-columns: 1fr; } }

    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .stat-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    /* Hierarchy cards */
    .hierarchy-list { display: flex; flex-direction: column; gap: 12px; }

    .h-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .h-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .h-card-header:hover { background: rgba(124,106,255,0.07); }

    .h-root {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 15px;
    }

    .root-badge {
      background: linear-gradient(135deg, var(--accent), #9b55ff);
      color: #fff;
      width: 28px; height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
    }

    .cycle-badge {
      background: rgba(255,94,122,0.15);
      color: var(--red);
      border: 1px solid rgba(255,94,122,0.3);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
      letter-spacing: 1px;
    }

    .depth-badge {
      background: rgba(61,255,160,0.1);
      color: var(--green);
      border: 1px solid rgba(61,255,160,0.2);
      border-radius: 6px;
      font-family: var(--mono);
      font-size: 10px;
      padding: 3px 8px;
    }

    .h-card-body { display: none; padding: 0 18px 18px; }
    .h-card-body.open { display: block; }

    .tree-view {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.8;
      color: var(--text);
      overflow-x: auto;
    }

    .tree-node { color: var(--yellow); }
    .tree-connector { color: var(--muted); }
    .tree-leaf { color: var(--green); }

    /* Tags */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .tag {
      font-family: var(--mono);
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 6px;
    }

    .tag-invalid {
      background: rgba(255,94,122,0.1);
      color: var(--red);
      border: 1px solid rgba(255,94,122,0.25);
    }

    .tag-dup {
      background: rgba(255,209,102,0.1);
      color: var(--yellow);
      border: 1px solid rgba(255,209,102,0.25);
    }

    .tag-empty {
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
      font-style: italic;
    }

    /* Error */
    .error-box {
      background: rgba(255,94,122,0.08);
      border: 1px solid rgba(255,94,122,0.3);
      border-radius: 10px;
      padding: 16px 20px;
      color: var(--red);
      font-family: var(--mono);
      font-size: 13px;
      display: none;
    }

    .chevron {
      color: var(--muted);
      font-size: 12px;
      transition: transform 0.2s;
    }

    .chevron.open { transform: rotate(180deg); }

    .json-toggle {
      margin-top: 16px;
    }

    .raw-json {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      overflow: auto;
      max-height: 300px;
      white-space: pre;
      display: none;
    }

    .raw-json.open { display: block; }

    .btn-tiny {
      font-family: var(--mono);
      font-size: 10px;
      padding: 5px 12px;
      background: var(--surface2);
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 1px;
    }

    .btn-tiny:hover { color: var(--text); border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-badge"><span class="dot"></span> Round 1 — SRM BFHL</div>
      <h1>Node Hierarchy<br/>Explorer</h1>
      <p class="subtitle">POST /bfhl · Tree builder & cycle detector</p>
    </header>

    <div class="card">
      <div class="card-label">Input edges</div>
      <textarea id="inputArea" placeholder='Enter edges one per line or comma-separated:
A->B
A->C
B->D
X->Y, Y->Z, Z->X
G->H, G->H, G->I
hello, 1->2, A->'></textarea>
      <div class="hint">Format: X->Y where X and Y are single uppercase letters (A–Z)</div>
      <div class="btn-row">
        <button class="btn-primary" id="submitBtn" onclick="submitData()">
          <span id="btnText">Analyze Edges</span>
          <div class="spinner" id="spinner"></div>
        </button>
        <button class="btn-secondary" onclick="loadExample()">Load Example</button>
        <button class="btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>

    <div class="error-box" id="errorBox"></div>

    <div id="results">
      <!-- Summary -->
      <div class="card">
        <div class="card-label">Summary</div>
        <div class="results-grid">
          <div class="stat-card">
            <div class="stat-label">Total Trees</div>
            <div class="stat-value" id="totalTrees">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Total Cycles</div>
            <div class="stat-value" id="totalCycles" style="color:var(--red)">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Largest Tree Root</div>
            <div class="stat-value" id="largestRoot" style="color:var(--green)">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">User ID</div>
            <div class="stat-value" id="userId" style="font-size:14px;color:var(--yellow)">—</div>
          </div>
        </div>
      </div>

      <!-- Hierarchies -->
      <div class="card">
        <div class="card-label">Hierarchies</div>
        <div class="hierarchy-list" id="hierarchyList"></div>
      </div>

      <!-- Invalid + Dupes -->
      <div class="results-grid">
        <div class="card">
          <div class="card-label">Invalid Entries</div>
          <div class="tag-list" id="invalidList"></div>
        </div>
        <div class="card">
          <div class="card-label">Duplicate Edges</div>
          <div class="tag-list" id="duplicateList"></div>
        </div>
      </div>

      <!-- Raw JSON -->
      <div class="card json-toggle">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="card-label" style="margin:0">Raw JSON Response</div>
          <button class="btn-tiny" onclick="toggleRaw()">Toggle</button>
        </div>
        <pre class="raw-json" id="rawJson"></pre>
      </div>
    </div>
  </div>

  <script>
    const API_URL = "/bfhl"; // relative — same origin

    async function submitData() {
      const raw = document.getElementById("inputArea").value.trim();
      if (!raw) return;

      // Parse input: split by newline and/or comma
      const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

      setLoading(true);
      hideError();
      document.getElementById("results").style.display = "none";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ data }),
        });

        if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        const json = await res.json();
        renderResults(json);
      } catch (err) {
        showError("API Error: " + err.message + "\n\nMake sure the server is running.");
      } finally {
        setLoading(false);
      }
    }

    function renderResults(data) {
      // Summary
      document.getElementById("totalTrees").textContent = data.summary.total_trees;
      document.getElementById("totalCycles").textContent = data.summary.total_cycles;
      document.getElementById("largestRoot").textContent = data.summary.largest_tree_root ?? "—";
      document.getElementById("userId").textContent = data.user_id;

      // Hierarchies
      const list = document.getElementById("hierarchyList");
      list.innerHTML = "";
      for (const h of data.hierarchies) {
        list.appendChild(buildHierarchyCard(h));
      }

      // Invalid
      const invList = document.getElementById("invalidList");
      invList.innerHTML = "";
      if (data.invalid_entries.length === 0) {
        invList.innerHTML = '<span class="tag-empty">None</span>';
      } else {
        data.invalid_entries.forEach(e => {
          const t = document.createElement("span");
          t.className = "tag tag-invalid";
          t.textContent = e || '""';
          invList.appendChild(t);
        });
      }

      // Duplicates
      const dupList = document.getElementById("duplicateList");
      dupList.innerHTML = "";
      if (data.duplicate_edges.length === 0) {
        dupList.innerHTML = '<span class="tag-empty">None</span>';
      } else {
        data.duplicate_edges.forEach(e => {
          const t = document.createElement("span");
          t.className = "tag tag-dup";
          t.textContent = e;
          dupList.appendChild(t);
        });
      }

      // Raw
      document.getElementById("rawJson").textContent = JSON.stringify(data, null, 2);

      document.getElementById("results").style.display = "block";
      document.getElementById("results").scrollIntoView({ behavior: "smooth" });
    }

    function buildHierarchyCard(h) {
      const card = document.createElement("div");
      card.className = "h-card";

      const header = document.createElement("div");
      header.className = "h-card-header";

      const left = document.createElement("div");
      left.className = "h-root";
      left.innerHTML = `<div class="root-badge">${h.root}</div> Root: ${h.root}`;

      const right = document.createElement("div");
      right.style.display = "flex";
      right.style.gap = "8px";
      right.style.alignItems = "center";

      if (h.has_cycle) {
        const b = document.createElement("span");
        b.className = "cycle-badge";
        b.textContent = "⟳ CYCLE";
        right.appendChild(b);
      } else {
        const b = document.createElement("span");
        b.className = "depth-badge";
        b.textContent = `depth ${h.depth}`;
        right.appendChild(b);
      }

      const chev = document.createElement("span");
      chev.className = "chevron";
      chev.textContent = "▼";
      right.appendChild(chev);

      header.appendChild(left);
      header.appendChild(right);

      const body = document.createElement("div");
      body.className = "h-card-body";

      if (h.has_cycle) {
        body.innerHTML = `<div class="tree-view" style="color:var(--red)">⚠ Cycle detected — no tree structure available.</div>`;
      } else {
        const tv = document.createElement("div");
        tv.className = "tree-view";
        tv.innerHTML = renderTree(h.tree, "", true);
        body.appendChild(tv);
      }

      header.addEventListener("click", () => {
        body.classList.toggle("open");
        chev.classList.toggle("open");
      });

      card.appendChild(header);
      card.appendChild(body);
      return card;
    }

    function renderTree(obj, prefix, isRoot) {
      let html = "";
      const keys = Object.keys(obj);
      keys.forEach((key, i) => {
        const isLast = i === keys.length - 1;
        const connector = isRoot ? "" : (isLast ? "└── " : "├── ");
        const childPrefix = isRoot ? "" : (isLast ? "    " : "│   ");
        const hasChildren = Object.keys(obj[key]).length > 0;
        const nodeClass = hasChildren ? "tree-node" : "tree-leaf";
        html += `<span class="tree-connector">${prefix}${connector}</span><span class="${nodeClass}">${key}</span>\n`;
        if (hasChildren) {
          html += renderTree(obj[key], prefix + childPrefix, false);
        }
      });
      return html;
    }

    function toggleRaw() {
      document.getElementById("rawJson").classList.toggle("open");
    }

    function loadExample() {
      document.getElementById("inputArea").value =
`A->B
A->C
B->D
C->E
E->F
X->Y
Y->Z
Z->X
P->Q
Q->R
G->H
G->H
G->I
hello
1->2
A->`;
    }

    function clearAll() {
      document.getElementById("inputArea").value = "";
      document.getElementById("results").style.display = "none";
      hideError();
    }

    function setLoading(on) {
      document.getElementById("submitBtn").disabled = on;
      document.getElementById("btnText").style.display = on ? "none" : "inline";
      document.getElementById("spinner").style.display = on ? "block" : "none";
    }

    function showError(msg) {
      const b = document.getElementById("errorBox");
      b.textContent = msg;
      b.style.display = "block";
    }

    function hideError() {
      document.getElementById("errorBox").style.display = "none";
    }
  </script>
</body>
</html>
